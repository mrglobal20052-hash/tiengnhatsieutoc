            { id: 401, category: '4. Yêu cầu & Cho phép', level: 'N5', grammar: 'Vてください', meaning: 'Hãy.../ Vui lòng...', formula: 'Vて + ください', exampleJP: 'ちょっと待ってください。', exampleVN: 'Hãy đợi tôi một chút.', parts: ['ちょっと', '待って', 'ください。'] },

            { id: 404, category: '4. Yêu cầu & Cho phép', level: 'N5', grammar: 'Vてもいいです', meaning: 'Cũng được (Cho phép)', formula: 'Vてもいいです', exampleJP: 'ここでタバコを吸ってもいいです。', exampleVN: 'Ở đây hút thuốc cũng được.', parts: ['ここで', 'タバコを吸っても', 'いいです。'] },
            { id: 405, category: '4. Yêu cầu & Cho phép', level: 'N5', grammar: 'Vましょう', meaning: 'Cùng...', formula: 'Vます + ましょう', exampleJP: '始めましょう。', exampleVN: 'Chúng ta cùng bắt đầu nào!', parts: ['始め', 'ましょう。'] },

            { id: 501, category: '5. Khả năng & Nghĩa vụ', level: 'N5', grammar: '〜ができます', meaning: 'Có thể...', formula: 'Vる + ことができます / N ができます', exampleJP: '日本語ができます。', exampleVN: 'Tôi có thể nói tiếng Nhật.', parts: ['日本語が', 'できます。'] },

            { id: 504, category: '5. Khả năng & Nghĩa vụ', level: 'N5', grammar: '〜なくてもいい', meaning: 'Không... cũng được', formula: 'Vない + くてもいい', exampleJP: 'お釣りを返さなくてもいいです。', exampleVN: 'Không cần trả lại tiền thừa cũng được.', parts: ['お釣りを', '返さなくても', 'いいです。'] },

            { id: 801, category: '8. Cho - Nhận & Mục đích', level: 'N5', grammar: 'Cho - nhận danh từ', meaning: 'Tặng/ nhận (あげます/もらいます/くれます)', formula: 'S は O に N を V', exampleJP: '私は家族に電話を掛けます。', exampleVN: 'Tôi gọi điện cho gia đình.', parts: ['私は', '家族に', '電話を', '掛けます。'] },
            { id: 802, category: '8. Cho - Nhận & Mục đích', level: 'N5', grammar: 'Cho - nhận động từ', meaning: 'Làm gì cho ai / được làm cho', formula: 'Vてあげます/ もらいます/ くれます', exampleJP: '先生に教えてもらいました。', exampleVN: 'Tôi được giáo viên dạy cho.', parts: ['先生に', '教えて', 'もらいました。'] },

            { id: 901, category: '9. Liên kết & Phán đoán', level: 'N5', grammar: '〜ても / 〜けれど / でも', meaning: 'Dù / Nhưng...', formula: 'Câu 1 + けれど/でも + Câu 2', exampleJP: '日本語は難しいが面白いです。', exampleVN: 'Tiếng Nhật khó nhưng thú vị.', parts: ['日本語は', '難しいが', '面白いです。'] },

            { id: 904, category: '9. Liên kết & Phán đoán', level: 'N5', grammar: '〜と思います', meaning: 'Nghĩ rằng...', formula: 'Thể thông thường + と思います', exampleJP: '物価が高いと思います。', exampleVN: 'Tôi nghĩ giá cả đắt đỏ.', parts: ['物価が', '高いと', '思います。'] },
            { id: 905, category: '9. Liên kết & Phán đoán', level: 'N5', grammar: '〜と言います', meaning: 'Nói rằng...', formula: '「Câu」 + と言います', exampleJP: '「いただきます」と言います。', exampleVN: 'Ta sẽ nói: "Itadakimasu".', parts: ['「いただきます」と', '言います。'] },
            { id: 906, category: '9. Liên kết & Phán đoán', level: 'N5', grammar: 'Mệnh đề bổ nghĩa', meaning: 'Động/Tính từ bổ nghĩa cho danh từ', formula: 'Thể thông thường + N', exampleJP: 'これは先週見た映画です。', exampleVN: 'Đây là bộ phim đã xem tuần trước.', parts: ['これは', '先週見た', '映画です。'] },
            { id: 907, category: '9. Liên kết & Phán đoán', level: 'N5', grammar: 'Vること', meaning: 'Việc... (danh từ hóa)', formula: 'Vる + こと', exampleJP: '外国語を勉強することは大変です。', exampleVN: 'Việc học ngoại ngữ rất vất vả.', parts: ['外国語を', '勉強することは', '大変です。'] }
        ];

        // Tạo danh sách các Category duy nhất
        const categories = [...new Set(grammarData.map(item => item.category))];

        // Quản lý trạng thái ứng dụng (State)
        let state = {
            currentView: 'dashboard', // dashboard, category_menu, flashcard, jlpt
            selectedCategory: null,
            filteredData: [],
            currentIndex: 0,
            showAnswer: false,
            shuffledParts: [],
            selectedParts: [],
            jlptResult: null
        };

        // Hàm cập nhật giao diện (Render)
        function render() {
            const root = document.getElementById('app-root');
            if (state.currentView === 'dashboard') {
                root.innerHTML = renderDashboard();
            } else if (state.currentView === 'category_menu') {
                root.innerHTML = renderCategoryMenu();
            } else if (state.currentView === 'flashcard') {
                root.innerHTML = renderFlashcard();
            } else if (state.currentView === 'jlpt') {
                root.innerHTML = renderJlptMode();
            }
        }

        // --- CÁC HÀM XỬ LÝ SỰ KIỆN ---

        window.openCategory = function(categoryName) {
            state.selectedCategory = categoryName;
            state.filteredData = grammarData.filter(item => item.category === categoryName);
            state.currentView = 'category_menu';
            render();
        };

        window.setView = function(view) {
            if(view === 'dashboard') {
                state.selectedCategory = null;
                state.filteredData = [];
            }
            state.currentView = view;
            if (view === 'jlpt') {
                state.currentIndex = 0;
                initJlptExercise();
            }
            if (view === 'flashcard') {
                state.currentIndex = 0;
                state.showAnswer = false;
            }
            render();
        };

        window.toggleAnswer = function(event) {
            if(event && event.target.closest('button.audio-btn')) return;
            state.showAnswer = !state.showAnswer;
            render();
        };

        window.nextCard = function() {
            state.showAnswer = false;
            state.currentIndex = (state.currentIndex + 1) % state.filteredData.length;
            if (state.currentView === 'jlpt') initJlptExercise();
            render();
        };

        window.prevCard = function() {
            state.showAnswer = false;
            state.currentIndex = (state.currentIndex - 1 + state.filteredData.length) % state.filteredData.length;
            if (state.currentView === 'jlpt') initJlptExercise();
            render();
        };

        window.speakText = function(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Trình duyệt của bạn không hỗ trợ đọc giọng nói.");
            }
        };

        function initJlptExercise() {
            const currentCard = state.filteredData[state.currentIndex];
            let parts = [...currentCard.parts];
            for (let i = parts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [parts[i], parts[j]] = [parts[j], parts[i]];
            }
            state.shuffledParts = parts;
            state.selectedParts = [];
            state.jlptResult = null;
        }

        window.handleSelectPart = function(part) {
            if (state.selectedParts.includes(part)) {
                state.selectedParts = state.selectedParts.filter(p => p !== part);
            } else {
                state.selectedParts.push(part);
            }
            render();
        };

        window.checkJlptAnswer = function() {
            const currentCard = state.filteredData[state.currentIndex];
            const isCorrect = state.selectedParts.join('') === currentCard.parts.join('');
            state.jlptResult = isCorrect;
            render();
        };

        window.resetJlpt = function() {
            state.selectedParts = [];
            state.jlptResult = null;
            render();
        };

        // --- CÁC HÀM TẠO GIAO DIỆN ---

        function renderDashboard() {
            const categoryCards = categories.map((cat, index) => {
                const count = grammarData.filter(item => item.category === cat).length;
                const icons = ['fa-cubes', 'fa-temperature-half', 'fa-list-ol', 'fa-hand-sparkles', 'fa-bolt', 'fa-clock', 'fa-scale-balanced', 'fa-gift', 'fa-link'];
                return `
                <button onclick="openCategory('${cat}')" class="glass-panel p-5 rounded-2xl shadow-sm hover:shadow-md transition text-left flex flex-col gap-2 group border border-emerald-100/50 hover:border-emerald-300">
                    <div class="bg-emerald-100 text-emerald-600 w-10 h-10 rounded-full flex items-center justify-center group-hover:scale-110 transition">
                        <i class="fa-solid ${icons[index] || 'fa-book'}"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 leading-tight">${cat}</h3>
                    <p class="text-xs text-slate-500 font-medium">${count} mẫu câu</p>
                </button>
                `;
            }).join('');

            return `
            <div class="space-y-8 animate-fade-in">
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100">
                    <h2 class="text-xl font-bold mb-4 text-slate-800 border-b pb-2"><i class="fa-solid fa-layer-group text-emerald-500 mr-2"></i>Chọn Chuyên Đề Tu Học N5</h2>
                    <p class="text-sm text-slate-500 mb-6">Việc chia nhỏ 71 mẫu câu thành 9 nhóm bản chất giúp bộ não tự động hình thành các liên kết logic, giảm tải sự ghi nhớ máy móc.</p>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        ${categoryCards}
                    </div>
                </div>
            </div>`;
        }

        function renderCategoryMenu() {
            return `
            <div class="max-w-2xl mx-auto space-y-6 animate-fade-in">
                <button onclick="setView('dashboard')" class="text-slate-500 hover:text-slate-800 transition flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-arrow-left"></i> Trở về Danh sách
                </button>

                <div class="bg-gradient-to-r from-emerald-600 to-teal-500 rounded-2xl p-6 md:p-8 text-white shadow-lg relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 inline-block">Chuyên đề</span>
                        <h2 class="text-2xl md:text-3xl font-bold mb-2">${state.selectedCategory}</h2>
                        <p class="text-emerald-50 flex items-center gap-2 text-sm md:text-base">
                            <i class="fa-solid fa-brain"></i> Gồm ${state.filteredData.length} mẫu câu liên kết logic với nhau.
                        </p>
                    </div>
                    <i class="fa-solid fa-leaf absolute -bottom-4 -right-4 text-8xl text-white opacity-10"></i>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="setView('flashcard')" class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-md transition border border-slate-100 flex flex-col items-center justify-center gap-4 group">
                        <div class="bg-blue-50 text-blue-500 w-16 h-16 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:bg-blue-100 transition">
                            <i class="fa-solid fa-book-open text-2xl"></i>
                        </div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-slate-800">Học & Luyện Nghe</h3>
                            <p class="text-sm text-slate-500 mt-1">Học công thức và luyện Shadowing.</p>
                        </div>
                    </button>

                    <button onclick="setView('jlpt')" class="bg-white p-8 rounded-2xl shadow-sm hover:shadow-md transition border border-slate-100 flex flex-col items-center justify-center gap-4 group">
                        <div class="bg-orange-50 text-orange-500 w-16 h-16 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:bg-orange-100 transition">
                            <i class="fa-solid fa-star text-2xl"></i>
                        </div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-slate-800">Luyện Đề Dấu Sao (*)</h3>
                            <p class="text-sm text-slate-500 mt-1">Luyện tư duy ghép câu JLPT.</p>
                        </div>
                    </button>
                </div>
            </div>`;
        }

        function renderFlashcard() {
            const currentCard = state.filteredData[state.currentIndex];
            
            let cardContent = '';
            if (!state.showAnswer) {
                cardContent = `
                <div class="space-y-4 pointer-events-none w-full text-center py-10">
                    <p class="text-sm text-emerald-500 font-bold uppercase tracking-widest mb-4">Cấu trúc</p>
                    <h2 class="text-3xl md:text-5xl font-bold text-slate-800 leading-tight">${currentCard.grammar}</h2>
                    <p class="text-slate-400 mt-6"><i class="fa-solid fa-hand-pointer animate-pulse"></i> Chạm để xem ý nghĩa</p>
                </div>`;
            } else {
                cardContent = `
                <div class="space-y-6 w-full animate-fade-in pointer-events-auto text-left">
                    <div class="border-b border-slate-100 pb-4">
                        <h2 class="text-2xl md:text-3xl font-bold text-slate-800 mb-2">${currentCard.grammar}</h2>
                        <p class="text-lg md:text-xl text-emerald-600 font-bold">${currentCard.meaning}</p>
                    </div>
                    
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Công thức</p>
                        <p class="font-mono text-slate-700 font-medium">${currentCard.formula}</p>
                    </div>

                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Ví dụ (Nghe & Lặp lại)</p>
                        <div class="flex gap-4 items-start bg-blue-50/50 p-4 rounded-xl">
                            <button onclick="speakText('${currentCard.exampleJP}')" class="audio-btn shrink-0 bg-blue-500 hover:bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center transition shadow-md" title="Nghe Audio">
                                <i class="fa-solid fa-headphones"></i>
                            </button>
                            <div>
                                <p class="text-lg font-bold text-slate-800 leading-snug">${currentCard.exampleJP}</p>
                                <p class="text-slate-600 mt-2 text-sm md:text-base">${currentCard.exampleVN}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="max-w-xl mx-auto w-full animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="setView('category_menu')" class="text-slate-500 hover:text-slate-800 font-medium transition flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Chuyên đề
                    </button>
                    <span class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-sm font-bold shadow-sm">
                        ${state.currentIndex + 1} / ${state.filteredData.length}
                    </span>
                </div>

                <div onclick="toggleAnswer(event)" class="bg-white min-h-[350px] rounded-3xl shadow-lg p-6 md:p-10 flex flex-col justify-center items-center cursor-pointer relative border border-slate-100 hover:border-emerald-200 transition-colors">
                    ${cardContent}
                </div>

                <div class="flex justify-between items-center mt-8">
                    <button onclick="prevCard()" class="px-6 py-3 bg-white border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 font-bold transition shadow-sm w-28">
                        <i class="fa-solid fa-chevron-left mr-1"></i> Trước
                    </button>
                    <button onclick="nextCard()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-bold transition shadow-md w-28">
                        Tiếp <i class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>`;
        }

        function renderJlptMode() {
            const currentCard = state.filteredData[state.currentIndex];
            
            let selectedHTML = state.selectedParts.map(part => 
                `<span onclick="handleSelectPart('${part}')" class="bg-orange-100 text-orange-800 px-4 py-2 rounded-lg font-medium cursor-pointer hover:bg-orange-200 transition shadow-sm">${part}</span>`
            ).join('');
            
            if (state.selectedParts.length === 0) {
                selectedHTML = `<span class="text-slate-400 italic py-2">Chạm vào các từ bên dưới để ghép câu...</span>`;
            }

            let shuffledHTML = state.shuffledParts.map(part => {
                const isSelected = state.selectedParts.includes(part);
                const baseClass = "px-4 py-2 rounded-lg border-2 font-bold transition";
                const stateClass = isSelected 
                    ? "bg-slate-50 border-slate-200 text-slate-300 cursor-not-allowed opacity-50" 
                    : "bg-white border-orange-200 text-slate-700 hover:border-orange-500 hover:text-orange-600 shadow-sm";
                
                return `<button onclick="handleSelectPart('${part}')" ${isSelected ? 'disabled' : ''} class="${baseClass} ${stateClass}">${part}</button>`;
            }).join('');

            let resultHTML = '';
            if (state.jlptResult === null) {
                const isComplete = state.selectedParts.length === state.shuffledParts.length;
                resultHTML = `
                <button onclick="checkJlptAnswer()" ${!isComplete ? 'disabled' : ''} class="px-8 py-4 rounded-xl font-bold text-white transition w-full md:w-auto text-lg ${!isComplete ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600 shadow-lg hover:-translate-y-1'}">
                    Kiểm tra đáp án
                </button>`;
            } else {
                if (state.jlptResult) {
                    resultHTML = `
                    <div class="w-full p-6 rounded-2xl flex flex-col items-center gap-5 animate-fade-in bg-emerald-50 border border-emerald-200">
                        <div class="flex items-center gap-3 text-xl">
                            <i class="fa-solid fa-circle-check text-emerald-500 text-2xl"></i>
                            <span class="font-extrabold text-emerald-700">Chính xác! Tâm bạn đang rất tĩnh.</span>
                        </div>
                        <div class="flex flex-wrap justify-center gap-4">
                            <button onclick="speakText('${currentCard.exampleJP}')" class="px-5 py-2.5 bg-blue-500 text-white rounded-xl flex items-center gap-2 hover:bg-blue-600 shadow-md font-bold transition">
                                <i class="fa-solid fa-headphones"></i> Luyện đọc theo
                            </button>
                            <button onclick="nextCard()" class="px-5 py-2.5 bg-emerald-600 text-white rounded-xl flex items-center gap-2 hover:bg-emerald-700 shadow-md font-bold transition">
                                Câu tiếp theo <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>`;
                } else {
                    resultHTML = `
                    <div class="w-full p-6 rounded-2xl flex flex-col items-center gap-4 animate-fade-in bg-rose-50 border border-rose-200">
                        <div class="flex items-center gap-2 text-lg">
                            <i class="fa-solid fa-rotate-right text-rose-500"></i>
                            <span class="font-bold text-rose-700">Chưa đúng rồi. Hãy thử tĩnh tâm lại nhé!</span>
                        </div>
                        <button onclick="resetJlpt()" class="px-6 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-bold transition shadow-sm">
                            Xóa đi ghép lại
                        </button>
                    </div>`;
                }
            }

            return `
            <div class="max-w-2xl mx-auto w-full animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="setView('category_menu')" class="text-slate-500 hover:text-slate-800 font-medium transition flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Chuyên đề
                    </button>
                    <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm">
                        <i class="fa-solid fa-star text-xs"></i> Luyện ghép câu
                    </span>
                </div>

                <div class="bg-white rounded-3xl shadow-lg p-6 md:p-8 mb-6 border border-slate-100">
                    <div class="mb-8 text-center">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Nghĩa tiếng Việt</p>
                        <p class="text-xl md:text-2xl text-slate-800 font-bold bg-slate-50 inline-block px-6 py-3 rounded-2xl border border-slate-100">${currentCard.exampleVN}</p>
                    </div>

                    <div class="min-h-[80px] bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl mb-8 flex flex-wrap gap-2 items-center justify-center p-4">
                        ${selectedHTML}
                    </div>

                    <div class="flex flex-wrap gap-3 justify-center mb-8">
                        ${shuffledHTML}
                    </div>

                    <div class="flex flex-col items-center gap-4">
                        ${resultHTML}
                    </div>
                </div>
                
                <div class="flex justify-between items-center text-sm font-medium text-slate-500">
                    <button onclick="prevCard()" class="hover:text-slate-800 transition">Câu trước</button>
                    <span class="bg-slate-200 px-3 py-1 rounded-full text-slate-700">${state.currentIndex + 1} / ${state.filteredData.length}</span>
                    <button onclick="nextCard()" class="hover:text-slate-800 transition">Bỏ qua</button>
                </div>
            </div>`;
        }

        render();
    </script>
</body>
</html>
