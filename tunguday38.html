    <main id="app-root" class="max-w-4xl mx-auto"></main>

    <script>
        // DỮ LIỆU N3: GOM NHÓM 9 CHUYÊN ĐỀ KHOA HỌC (CHUNKED)
        const grammarData = [
            // --- NHÓM 1: THỜI GIAN & HOÀN CẢNH (Trạng thái và thời điểm) ---
            { id: 101, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜うちに (1)', meaning: 'Nhân lúc, khi còn (có chủ ý)', formula: 'Vる/Vている/Aい/Aな/Nの + うちに', exampleJP: '日本にいるうちに一度富士山に登ってみたい。', exampleVN: 'Nhân lúc còn ở Nhật thì tôi muốn 1 lần leo thử núi Phú Sĩ.', parts: ['日本に', 'いるうちに', '一度富士山に', '登ってみたい。'] },
            { id: 102, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜うちに (2)', meaning: 'Trong khi... (Bất ngờ xảy ra)', formula: 'Vる/Vている/Vない + うちに', exampleJP: '音楽を聞いているうちに眠ってしまった。', exampleVN: 'Trong khi đang nghe nhạc thì tôi đã ngủ quên mất.', parts: ['音楽を', '聞いているうちに', '眠ってしまった。'] },
            { id: 103, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜間に / 〜間', meaning: 'Trong khi / Suốt trong khi', formula: 'Vる/Vている/Nの + 間に/間', exampleJP: '留守の間に、泥棒が入りました。', exampleVN: 'Trong lúc đi vắng, trộm đã đột nhập vào nhà.', parts: ['留守の', '間に、', '泥棒が', '入りました。'] },
            { id: 104, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜最中に', meaning: 'Đúng lúc đang... (Bị xen vào)', formula: 'Vている/Nの + 最中に', exampleJP: '会議の最中に、電話が鳴りました。', exampleVN: 'Đúng lúc đang họp thì điện thoại reo.', parts: ['会議の', '最中に、', '電話が', '鳴りました。'] },
            { id: 105, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜てからでないと', meaning: 'Nếu chưa... thì không thể...', formula: 'Vてからでないと / Vてからでなければ', exampleJP: 'お金をいただいてからでないと、商品はお届けできません。', exampleVN: 'Nếu chưa nhận được tiền thì hàng cũng không giao được.', parts: ['お金を', 'いただいてから', 'でないと、', 'お届けできません。'] },
            { id: 106, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜ところ', meaning: 'Đúng lúc (chuẩn bị / đang / vừa xong)', formula: 'Vる/Vている/Vた + ところ', exampleJP: 'ロケットは間もなく飛び立つところです。', exampleVN: 'Tên lửa chuẩn bị cất cánh rồi.', parts: ['ロケットは', '間もなく', '飛び立つ', 'ところです。'] },
            { id: 107, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜たびに', meaning: 'Cứ mỗi lần...', formula: 'Vる/Nの + たびに', exampleJP: '母は電話をかけるたびに、ご飯を食べているかと聞く。', exampleVN: 'Cứ mỗi lần gọi điện, mẹ đều hỏi tôi có ăn uống đầy đủ không.', parts: ['母は', '電話をかける', 'たびに、', '聞く。'] },
            { id: 108, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜ついでに', meaning: 'Nhân tiện, tiện thể...', formula: 'Vる/Vた/Nする + ついでに', exampleJP: '銀行へ行くついでにこの手紙を出してくれませんか。', exampleVN: 'Tiện thể đến ngân hàng anh gửi giúp lá thư này được không?', parts: ['銀行へ', '行く', 'ついでに', '出してくれませんか。'] },
            { id: 109, category: '1. Thời Gian & Hoàn Cảnh', level: 'N3', grammar: '〜途中で', meaning: 'Đang trên đường...', formula: 'Vる/Nの + 途中で', exampleJP: '家に帰る途中で、パン屋に寄った。', exampleVN: 'Trên đường trở về nhà, tôi ghé tiệm bánh mì.', parts: ['家に帰る', '途中で、', 'パン屋に寄った。'] },

            // --- NHÓM 2: NGUYÊN NHÂN & LÝ DO (Sắc thái rõ ràng) ---
            { id: 201, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜おかげで', meaning: 'Nhờ có... (Kết quả tốt)', formula: 'V/A/N(thể ngắn) + おかげで', exampleJP: '先生のおかげで、合格できました。', exampleVN: 'Nhờ có thầy mà em đã đỗ.', parts: ['先生の', 'おかげで、', '合格', 'できました。'] },
            { id: 202, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜せいで', meaning: 'Tại vì... (Kết quả xấu)', formula: 'V/A/N(thể ngắn) + せいで', exampleJP: '雨のせいで、試合が中止になりました。', exampleVN: 'Tại vì mưa nên trận đấu đã bị hủy.', parts: ['雨の', 'せいで、', '試合が', '中止になりました。'] },
            { id: 203, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜のだから', meaning: 'Vì... là chuyện đương nhiên', formula: 'V/A/N(thể ngắn) + のだから', exampleJP: '世界は広いのだから、色々な習慣があるのは当然だ。', exampleVN: 'Vì thế giới rộng lớn nên có nhiều phong tục là đương nhiên.', parts: ['世界は', '広いのだから、', '当然だ。'] },
            { id: 204, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜ためだ / 〜ために', meaning: 'Vì... cho nên (Trang trọng)', formula: 'V/A/N(thể ngắn) + ため(に)', exampleJP: 'この工場の中は危険なために、入ることができません。', exampleVN: 'Vì bên trong nhà máy này nguy hiểm nên không thể vào.', parts: ['この工場の中は', '危険な', 'ために、', '入ることができません。'] },
            { id: 205, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜から / 〜ことから', meaning: 'Bởi vì... (Nguồn gốc lý do)', formula: 'V/A/N(thể ngắn) + から/ことから', exampleJP: 'わずかな誤解から友達との関係が悪くなってしまった。', exampleVN: 'Mối quan hệ với bạn xấu đi do một hiểu lầm nhỏ.', parts: ['わずかな', '誤解から', '関係が', '悪くなってしまった。'] },
            { id: 206, category: '2. Nguyên Nhân & Lý Do', level: 'N3', grammar: '〜のは...からだ', meaning: 'Sở dĩ... là vì...', formula: '〜のは...からだ / ためだ', exampleJP: '彼女が試験に失敗したのは、体の調子が悪かったからだ。', exampleVN: 'Sở dĩ cô ấy thi trượt là vì sức khoẻ không được tốt.', parts: ['失敗したのは、', '体の調子が', '悪かった', 'からだ。'] },

            // --- NHÓM 3: SO SÁNH & MỨC ĐỘ (Quan hệ tương phản) ---
            { id: 301, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: '〜くらい / 〜ほど', meaning: 'Đến mức... / Khoảng...', formula: 'N/V/A + くらい/ほど', exampleJP: '足が動けないほど、疲れました。', exampleVN: 'Tôi mệt đến mức chân không cử động được.', parts: ['足が', '動けないほど、', '疲れました。'] },
            { id: 302, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: '〜くらい〜はない', meaning: 'Không có gì... bằng...', formula: 'N + くらい/ほど + はない', exampleJP: 'リーさんぐらい動物好きなひとはいない。', exampleVN: 'Không có ai yêu động vật bằng Ly.', parts: ['リーさんぐらい', '動物好きな', 'ひとは', 'いない。'] },
            { id: 303, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: '〜につれて / 〜にしたがって', meaning: 'Càng... càng... (Biến đổi đồng thời)', formula: 'Vる/N + につれて/にしたがって', exampleJP: '台風が近づくにつれて、風が強くなります。', exampleVN: 'Cơn bão càng đến gần thì gió càng mạnh.', parts: ['台風が', '近づくにつれて、', '風が', '強くなります。'] },
            { id: 304, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: '〜反面', meaning: 'Mặt khác... (Hai mặt của 1 vấn đề)', formula: 'Thể ngắn + 反面', exampleJP: 'この薬はよく効く反面、副作用がある。', exampleVN: 'Thuốc này tác dụng tốt nhưng mặt khác có tác dụng phụ.', parts: ['この薬は', 'よく効く', '反面、', '副作用がある。'] },
            { id: 305, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: '〜一方 (で)', meaning: 'Nhưng đồng thời.../ Trái lại...', formula: 'Thể ngắn + 一方(で)', exampleJP: '私の仕事は夏は忙しい一方、冬は暇になる。', exampleVN: 'Công việc của tôi mùa hè thì bận, trái lại mùa đông rất nhàn.', parts: ['夏は', '忙しい一方、', '冬は', '暇になる。'] },
            { id: 306, category: '3. So Sánh & Mức Độ', level: 'N3', grammar: 'AというよりB', meaning: 'Nói là B thì đúng hơn là A', formula: 'A というより B', exampleJP: '彼の言い方は勧めているというより、強制しているようだ。', exampleVN: 'Cách nói của anh ấy giống như ép buộc hơn là khuyên nhủ.', parts: ['勧めている', 'というより、', '強制している', 'ようだ。'] },

            // --- NHÓM 4: TRẠNG THÁI & TÍNH CHẤT (Kéo dài, đột ngột) ---
            { id: 401, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + がち', meaning: 'Thường hay... / Dễ bị...', formula: 'V(bỏ ます) / N + がち', exampleJP: '冬になると、電車が遅れがちだ。', exampleVN: 'Khi mùa đông đến thì tàu điện thường hay bị trễ.', parts: ['冬になると、', '電車が', '遅れがちだ。'] },
            { id: 402, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + ぎらい', meaning: 'Khó... (Sự khó chịu, không thích)', formula: 'V(bỏ ます) + ぎらい / づらい', exampleJP: 'この質問には答えづらいです。', exampleVN: 'Câu hỏi này rất khó trả lời.', parts: ['この質問には', '答え', 'づらいです。'] },
            { id: 403, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: '〜ばかりだ / 〜てばかりいる', meaning: 'Cứ dần... / Suốt ngày chỉ...', formula: 'Vる ばかりだ / Vて ばかりいる', exampleJP: '彼は寝てばかりいる。', exampleVN: 'Anh ta cứ ngủ suốt ngày thôi.', parts: ['彼は', '寝て', 'ばかりいる。'] },
            { id: 404, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + かける / かけた', meaning: 'Đang dở... / Giữa chừng...', formula: 'V(bỏ ます) + かける', exampleJP: '母に食べかけのリンゴを捨てられてしまった。', exampleVN: 'Tôi bị mẹ vứt mất quả táo đang ăn dở.', parts: ['母に', '食べかけのリンゴを', '捨てられてしまった。'] },
            { id: 405, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + 出す', meaning: 'Bắt đầu... (Đột ngột)', formula: 'V(bỏ ます) + 出す', exampleJP: '突然笑い出した。', exampleVN: 'Đột nhiên bật cười.', parts: ['突然', '笑い', '出した。'] },
            { id: 406, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + きる', meaning: 'Làm xong toàn bộ, hết sạch', formula: 'V(bỏ ます) + きる', exampleJP: '長い小説、2日間で読みきった。', exampleVN: 'Tôi đã đọc hết sạch cuốn tiểu thuyết dài trong 2 ngày.', parts: ['長い小説、', '2日間で', '読みきった。'] },
            { id: 407, category: '4. Trạng Thái & Tính Chất', level: 'N3', grammar: 'Vます + 通す', meaning: 'Làm đến cùng', formula: 'V(bỏ ます) + 通す', exampleJP: '自分で決めたことは最後までやり通そう。', exampleVN: 'Hãy thực hiện đến cùng những gì bạn đã quyết định.', parts: ['決めたことは', '最後まで', 'やり通そう。'] },

            // --- NHÓM 5: PHÁN ĐOÁN, QUAN ĐIỂM & ĐÁNH GIÁ ---
            { id: 501, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜にしては', meaning: 'Tuy... nhưng... (Khác với tiêu chuẩn)', formula: 'N/V(thể ngắn) + にしては', exampleJP: '初めてにしては、よくできました。', exampleVN: 'So với lần đầu thì bạn đã làm rất tốt.', parts: ['初めてに', 'しては、', 'よくできました。'] },
            { id: 502, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜に違いない', meaning: 'Chắc chắn là... (Khẳng định mạnh)', formula: 'Thể ngắn + に違いない', exampleJP: '犯人は彼に違いありません。', exampleVN: 'Thủ phạm chắc chắn là anh ta.', parts: ['犯人は', '彼に', '違いありません。'] },
            { id: 503, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜はずがない / 〜わけがない', meaning: 'Không thể nào... (Phủ định logic)', formula: 'Thể ngắn + はずがない/わけがない', exampleJP: '彼が忘れるわけないよ。', exampleVN: 'Anh ấy không đời nào quên đâu.', parts: ['彼が', '忘れる', 'わけないよ。'] },
            { id: 504, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜とは限らない', meaning: 'Chưa chắc là...', formula: 'Thể ngắn + とは限らない', exampleJP: 'お金が必ずしも幸福だとは限らない。', exampleVN: 'Giàu có chưa hẳn đã hạnh phúc.', parts: ['お金が', '幸福だとは', '限らない。'] },
            { id: 505, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜わけだ / 〜というわけだ', meaning: 'Vì vậy, hèn chi, có nghĩa là...', formula: 'Thể ngắn + わけだ', exampleJP: '今から出れば9時にはつくわけだ。', exampleVN: 'Vậy nếu bây giờ đi thì có nghĩa là sẽ có mặt lúc 9 giờ.', parts: ['今から出れば', '9時には', 'つくわけだ。'] },
            { id: 506, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜ことはない / 〜というわけではない', meaning: 'Không hẳn là... / Không phải là...', formula: 'Thể phủ định + ことはない/わけではない', exampleJP: '美味しくないことはないが、もっと辛いのが好きだ。', exampleVN: 'Không phải là không ngon nhưng tôi thích cay hơn.', parts: ['美味しくない', 'ことはないが、', 'もっと辛いのが好きだ。'] },
            { id: 507, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜っぽい', meaning: 'Có vẻ như... (Thường mang ý chê)', formula: 'N / V(bỏ ます) + っぽい', exampleJP: 'あの人は少し子供っぽいです。', exampleVN: 'Người kia hơi trẻ con một chút.', parts: ['あの人は', '少し', '子供っぽいです。'] },
            { id: 508, category: '5. Phán Đoán & Đánh Giá', level: 'N3', grammar: '〜といっても', meaning: 'Nói là... nhưng thực tế thì...', formula: 'Thể ngắn + といっても', exampleJP: '料理ができるといっても、卵焼きだけです。', exampleVN: 'Nói là biết nấu ăn nhưng chỉ là món trứng cuộn thôi.', parts: ['料理ができると', 'いっても、', '卵焼きだけです。'] },

            // --- NHÓM 6: ĐIỀU KIỆN & LỜI KHUYÊN NÂNG CAO ---
            { id: 601, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: '〜(の)なら', meaning: 'Nếu... thì...', formula: 'Thể ngắn + (の)なら', exampleJP: '嫌いなら、別れたらいい。', exampleVN: 'Nếu ghét như thế rồi thì nên chia tay đi.', parts: ['嫌いなら、', '別れたら', 'いい。'] },
            { id: 602, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: '〜てば / 〜では', meaning: 'Nếu mà... (Kết quả thường tiêu cực)', formula: 'Vて/Aくて/Nで + は', exampleJP: '今お見舞いにいってはかえって迷惑だろう。', exampleVN: 'Bây giờ mà đến thăm thì ngược lại sẽ làm phiền.', parts: ['お見舞いに', 'いっては', '迷惑だろう。'] },
            { id: 603, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: '〜さえ...ば', meaning: 'Chỉ cần... thì...', formula: 'N + さえ + Vば', exampleJP: '漫画さえ読んでいれば退屈しないだろう。', exampleVN: 'Chỉ cần đọc truyện tranh thì sẽ không chán đâu.', parts: ['漫画さえ', '読んでいれば', '退屈しないだろう。'] },
            { id: 604, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: '〜たところで', meaning: 'Cho dù là... thì cũng (Kết quả không đổi)', formula: 'Vた + ところで', exampleJP: 'たとえ失敗したところで後悔しない。', exampleVN: 'Cho dù có thất bại đi nữa tôi cũng sẽ không hối hận.', parts: ['たとえ', '失敗したところで', '後悔しない。'] },
            { id: 605, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: 'Vたらどうか', meaning: 'Nếu... thì sao? (Gợi ý nhẹ nhàng)', formula: 'Vたらどうか', exampleJP: '一度健康診断を受けたらどうか。', exampleVN: 'Nên đi kiểm tra sức khỏe xem thế nào?', parts: ['一度', '健康診断を', '受けたらどうか。'] },
            { id: 606, category: '6. Điều Kiện & Lời Khuyên', level: 'N3', grammar: '〜くらいなら', meaning: 'Nếu phải... thì thà... còn hơn', formula: 'Vる + くらいなら', exampleJP: '気が合わない人と生活するぐらいなら、独身でいたい。', exampleVN: 'Nếu phải sống với người không hợp thì thà độc thân còn hơn.', parts: ['生活するぐらいなら、', 'このまま', '独身でいたい。'] },

            // --- NHÓM 7: TRUYỀN ĐẠT THÔNG TIN & TIN ĐỒN ---

            { id: 802, category: '8. Quy Định & Ý Chí', level: 'N3', grammar: '〜ことになっている', meaning: 'Quy định / Được quyết định là...', formula: 'Vる/Vない + ことになっている', exampleJP: 'ここではタバコを吸わないことになってる。', exampleVN: 'Ở đây có quy định là không được hút thuốc.', parts: ['ここでは', 'タバコを吸わない', 'ことになってる。'] },
            { id: 803, category: '8. Quy Định & Ý Chí', level: 'N3', grammar: '〜ようにしている', meaning: 'Cố gắng làm gì đó', formula: 'Vる/Vない + ようにしている', exampleJP: '野菜をたくさん食べるようにしています。', exampleVN: 'Tôi đang cố gắng ăn nhiều rau.', parts: ['野菜を', 'たくさん食べる', 'ようにしています。'] },
            { id: 804, category: '8. Quy Định & Ý Chí', level: 'N3', grammar: '〜ようになっている', meaning: 'Cơ chế / Được thiết kế để...', formula: 'Vる/Vない + ようになっている', exampleJP: 'このドアは自動で開くようになっている。', exampleVN: 'Cái cửa này được thiết kế để tự động mở.', parts: ['このドアは', '自動で開く', 'ようになっている。'] },
            { id: 805, category: '8. Quy Định & Ý Chí', level: 'N3', grammar: '〜(よ)うとする', meaning: 'Cố gắng định làm gì (Khoảnh khắc)', formula: 'V(ý chí) + とする', exampleJP: 'おもちゃを取ろうとしている。', exampleVN: 'Đứa bé đang cố gắng với tay lấy món đồ chơi.', parts: ['おもちゃを', '取ろうと', 'している。'] },
            { id: 806, category: '8. Quy Định & Ý Chí', level: 'N3', grammar: 'Vわけにはいかない', meaning: 'Buộc phải / Không thể không làm', formula: 'Vない + わけにはいかない', exampleJP: '何も着ないわけにはいかないよね。', exampleVN: 'Nóng nhưng không thể không mặc gì được.', parts: ['何も', '着ない', 'わけにはいかないよね。'] },

            // --- NHÓM 9: TRỢ TỪ PHỨC N3 (COMPOUND PARTICLES) ---
            { id: 901, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜において', meaning: 'Tại / Ở (Trang trọng thay cho で)', formula: 'N + において', exampleJP: '会議はホールにおいて行われます。', exampleVN: 'Cuộc họp được tổ chức tại hội trường.', parts: ['会議は', 'ホールにおいて', '行われます。'] },
            { id: 902, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜として / 〜を...として', meaning: 'Với tư cách là / Lấy... làm...', formula: 'N + として / NをNとして', exampleJP: '家族をテーマとした小説を書いている。', exampleVN: 'Đã viết nhiều tiểu thuyết lấy gia đình làm chủ đề.', parts: ['家族を', 'テーマとした', '小説を書いている。'] },
            { id: 903, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜によって (Tác nhân/Phương pháp)', meaning: 'Bởi / Bằng cách...', formula: 'N + によって', exampleJP: 'この本は有名人によって書かれました。', exampleVN: 'Cuốn sách này được viết bởi một người nổi tiếng.', parts: ['この本は', '有名人によって', '書かれました。'] },
            { id: 904, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜によって (Tùy thuộc)', meaning: 'Tùy thuộc vào / Tùy theo', formula: 'N + によって/によっては', exampleJP: '国によって習慣が違う。', exampleVN: 'Phong tục sẽ khác nhau tùy theo từng nước.', parts: ['国によって', '習慣が', '違う。'] },
            { id: 905, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜について', meaning: 'Về (nội dung)...', formula: 'N + について', exampleJP: '入学手続きについて聞きたいのですが。', exampleVN: 'Tôi muốn hỏi về thủ tục nhập học.', parts: ['入学手続きに', 'ついて', '聞きたいのですが。'] },
            { id: 906, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜に対して', meaning: 'Đối với / Trái ngược với', formula: 'N + に対して', exampleJP: '客に対して非常に丁寧な言葉を使う。', exampleVN: 'Dùng từ ngữ lịch sự đối với khách hàng.', parts: ['客に対して', '丁寧な言葉を', '使う。'] },
            { id: 907, category: '9. Trợ Từ Phức N3', level: 'N3', grammar: '〜から〜にかけて', meaning: 'Trong suốt từ... đến...', formula: 'N1 から N2 にかけて', exampleJP: '年末から年始にかけて私はとてもいそがしい。', exampleVN: 'Tôi rất bận rộn từ cuối năm đến đầu năm.', parts: ['年末から', '年始にかけて', '私はとてもいそがしい。'] }
        ];

        const categories = [...new Set(grammarData.map(item => item.category))];

        let state = {
            currentView: 'dashboard',
            selectedCategory: null,
            filteredData: [],
            currentIndex: 0,
            showAnswer: false,
            shuffledParts: [],
            selectedParts: [],
            jlptResult: null
        };

        function render() {
            const root = document.getElementById('app-root');
            if (state.currentView === 'dashboard') {
                root.innerHTML = renderDashboard();
            } else if (state.currentView === 'category_menu') {
                root.innerHTML = renderCategoryMenu();
            } else if (state.currentView === 'flashcard') {
                root.innerHTML = renderFlashcard();
            } else if (state.currentView === 'jlpt') {
                root.innerHTML = renderJlptMode();
            }
        }

        window.openCategory = function(categoryName) {
            state.selectedCategory = categoryName;
            state.filteredData = grammarData.filter(item => item.category === categoryName);
            state.currentView = 'category_menu';
            render();
        };

        window.setView = function(view) {
            if(view === 'dashboard') {
                state.selectedCategory = null;
                state.filteredData = [];
            }
            state.currentView = view;
            if (view === 'jlpt') {
                state.currentIndex = 0;
                initJlptExercise();
            }
            if (view === 'flashcard') {
                state.currentIndex = 0;
                state.showAnswer = false;
            }
            render();
        };

        window.toggleAnswer = function(event) {
            if(event && event.target.closest('button.audio-btn')) return;
            state.showAnswer = !state.showAnswer;
            render();
        };

        window.nextCard = function() {
            state.showAnswer = false;
            state.currentIndex = (state.currentIndex + 1) % state.filteredData.length;
            if (state.currentView === 'jlpt') initJlptExercise();
            render();
        };

        window.prevCard = function() {
            state.showAnswer = false;
            state.currentIndex = (state.currentIndex - 1 + state.filteredData.length) % state.filteredData.length;
            if (state.currentView === 'jlpt') initJlptExercise();
            render();
        };

        window.speakText = function(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ja-JP';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Trình duyệt của bạn không hỗ trợ đọc giọng nói.");
            }
        };

        function initJlptExercise() {
            const currentCard = state.filteredData[state.currentIndex];
            let parts = [...currentCard.parts];
            for (let i = parts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [parts[i], parts[j]] = [parts[j], parts[i]];
            }
            state.shuffledParts = parts;
            state.selectedParts = [];
            state.jlptResult = null;
        }

        window.handleSelectPart = function(part) {
            if (state.selectedParts.includes(part)) {
                state.selectedParts = state.selectedParts.filter(p => p !== part);
            } else {
                state.selectedParts.push(part);
            }
            render();
        };

        window.checkJlptAnswer = function() {
            const currentCard = state.filteredData[state.currentIndex];
            const isCorrect = state.selectedParts.join('') === currentCard.parts.join('');
            state.jlptResult = isCorrect;
            render();
        };

        window.resetJlpt = function() {
            state.selectedParts = [];
            state.jlptResult = null;
            render();
        };

        function renderDashboard() {
            const categoryCards = categories.map((cat, index) => {
                const count = grammarData.filter(item => item.category === cat).length;
                const icons = ['fa-hourglass-half', 'fa-network-wired', 'fa-scale-unbalanced', 'fa-chart-pie', 'fa-gavel', 'fa-signs-post', 'fa-tower-broadcast', 'fa-flag-checkered', 'fa-link'];
                return `
                <button onclick="openCategory('${cat}')" class="glass-panel p-5 rounded-2xl shadow-sm hover:shadow-md transition text-left flex flex-col gap-2 group border border-purple-100 hover:border-purple-400">
                    <div class="bg-theme-light w-10 h-10 rounded-full flex items-center justify-center group-hover:scale-110 transition shadow-sm">
                        <i class="fa-solid ${icons[index] || 'fa-book'} text-lg"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 leading-tight">${cat}</h3>
                    <p class="text-xs text-slate-500 font-medium">${count} sắc thái</p>
                </button>
                `;
            }).join('');

            return `
            <div class="space-y-8 animate-fade-in">
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-xl font-bold mb-4 text-slate-800 border-b border-purple-100 pb-2"><i class="fa-solid fa-layer-group text-purple-500 mr-2"></i>Chuyên Đề N3 - Thể Trí Sáng Suốt</h2>
                        <p class="text-sm text-slate-500 mb-6 leading-relaxed">Ngữ pháp N3 không phải là công thức khô khan, mà là <strong>sắc thái và cảm xúc</strong>. Gom nhóm khoa học giúp não bộ dễ dàng thấu cảm và phân biệt sự tinh tế trong ngôn ngữ, đồng thuận hướng tới mục tiêu JLPT N3 7/2026.</p>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            ${categoryCards}
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function renderCategoryMenu() {
            return `
            <div class="max-w-2xl mx-auto space-y-6 animate-fade-in">
                <button onclick="setView('dashboard')" class="text-slate-500 hover:text-slate-800 transition flex items-center gap-2 font-medium">
                    <i class="fa-solid fa-arrow-left"></i> Trở về Danh sách
                </button>

                <div class="theme-gradient rounded-3xl p-6 md:p-8 text-white shadow-xl relative overflow-hidden">
                    <div class="relative z-10">
                        <span class="bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-3 inline-block backdrop-blur-sm border border-white/10">Chuyên đề N3</span>
                        <h2 class="text-2xl md:text-3xl font-extrabold mb-2 text-white drop-shadow-md">${state.selectedCategory}</h2>
                        <p class="text-purple-100 flex items-center gap-2 text-sm md:text-base font-medium">
                            <i class="fa-solid fa-brain opacity-80"></i> Phân tích sâu sắc ${state.filteredData.length} mẫu câu cốt lõi.
                        </p>
                    </div>
                    <i class="fa-solid fa-yin-yang absolute -bottom-8 -right-8 text-9xl text-white opacity-10 rotate-12"></i>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <button onclick="setView('flashcard')" class="bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition border border-purple-50 flex flex-col items-center justify-center gap-4 group hover:-translate-y-1">
                        <div class="bg-theme-light w-16 h-16 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:bg-purple-200 transition shadow-inner">
                            <i class="fa-solid fa-book-open text-2xl text-purple-600"></i>
                        </div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-slate-800">Thấu Cảm Ý Nghĩa</h3>
                            <p class="text-sm text-slate-500 mt-1">Học bản chất & luyện Shadowing tự nhiên.</p>
                        </div>
                    </button>

                    <button onclick="setView('jlpt')" class="bg-white p-8 rounded-3xl shadow-sm hover:shadow-xl transition border border-purple-50 flex flex-col items-center justify-center gap-4 group hover:-translate-y-1">
                        <div class="bg-orange-50 w-16 h-16 rounded-full flex items-center justify-center group-hover:scale-110 group-hover:bg-orange-100 transition shadow-inner">
                            <i class="fa-solid fa-star text-2xl text-orange-500"></i>
                        </div>
                        <div class="text-center">
                            <h3 class="font-bold text-lg text-slate-800">Luyện Đề Dấu Sao (*)</h3>
                            <p class="text-sm text-slate-500 mt-1">Rèn Thể Trí sắc bén qua bài tập ghép câu JLPT.</p>
                        </div>
                    </button>
                </div>
            </div>`;
        }

        function renderFlashcard() {
            const currentCard = state.filteredData[state.currentIndex];
            
            let cardContent = '';
            if (!state.showAnswer) {
                cardContent = `
                <div class="space-y-6 pointer-events-none w-full flex flex-col items-center justify-center min-h-[250px] py-6">

                        <i class="fa-solid fa-eye"></i>
                        <span class="text-sm font-bold tracking-wide">Chạm để mở rộng nhãn quan</span>
                    </div>

            } else {
                cardContent = `
                <div class="space-y-6 w-full animate-fade-in pointer-events-auto text-left">
                    <div class="border-b border-slate-100 pb-4">
                        <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2">${currentCard.grammar}</h2>
                        <p class="text-lg md:text-xl text-theme font-bold">${currentCard.meaning}</p>

                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-inner">

                    </div>

                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Ví dụ JLPT (Shadowing)</p>

                                <i class="fa-solid fa-volume-high"></i>

                            </div>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="max-w-xl mx-auto w-full animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="setView('category_menu')" class="text-slate-500 hover:text-slate-800 font-bold transition flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Chuyên đề
                    </button>
                    <span class="bg-theme-light px-4 py-1.5 rounded-full text-sm font-bold shadow-sm border border-theme-light text-theme">
                        <i class="fa-solid fa-layer-group mr-1"></i> ${state.currentIndex + 1} / ${state.filteredData.length}

                </div>

                <div onclick="toggleAnswer(event)" class="bg-white min-h-[380px] rounded-3xl shadow-xl p-6 md:p-10 flex flex-col justify-center items-center cursor-pointer relative border border-slate-100 hover:border-purple-300 transition-colors">

                    </button>
                </div>

        }

        function renderJlptMode() {
            const currentCard = state.filteredData[state.currentIndex];
            
            let selectedHTML = state.selectedParts.map(part => 
                `<span onclick="handleSelectPart('${part}')" class="bg-orange-100 text-orange-800 px-4 py-2.5 rounded-xl font-bold cursor-pointer hover:bg-orange-200 transition shadow-sm border border-orange-200/50">${part}</span>`
            ).join('');
            
            if (state.selectedParts.length === 0) {
                selectedHTML = `<span class="text-slate-400 italic py-2 font-medium">Chạm vào các từ bên dưới để ghép câu...</span>`;
            }

            let shuffledHTML = state.shuffledParts.map(part => {
                const isSelected = state.selectedParts.includes(part);
                const baseClass = "px-5 py-2.5 rounded-xl border-2 font-bold transition-all duration-200";
                const stateClass = isSelected 
                    ? "bg-slate-50 border-slate-200 text-slate-300 cursor-not-allowed opacity-40 scale-95" 
                    : "bg-white border-orange-200 text-slate-700 hover:border-orange-500 hover:text-orange-600 shadow-sm hover:-translate-y-0.5";
                
                return `<button onclick="handleSelectPart('${part}')" ${isSelected ? 'disabled' : ''} class="${baseClass} ${stateClass}">${part}</button>`;
            }).join('');

            let resultHTML = '';
            if (state.jlptResult === null) {
                const isComplete = state.selectedParts.length === state.shuffledParts.length;
                resultHTML = `
                <button onclick="checkJlptAnswer()" ${!isComplete ? 'disabled' : ''} class="px-8 py-4 rounded-2xl font-bold text-white transition w-full md:w-auto text-lg ${!isComplete ? 'bg-slate-300 cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600 shadow-lg hover:-translate-y-1'} flex items-center justify-center gap-2">
                    <i class="fa-solid fa-spell-check"></i> Kiểm tra đáp án
                </button>`;
            } else {
                if (state.jlptResult) {
                    resultHTML = `
                    <div class="w-full p-6 rounded-3xl flex flex-col items-center gap-5 animate-fade-in bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-200 shadow-inner">
                        <div class="flex items-center gap-3 text-xl">
                            <div class="bg-emerald-500 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-md">
                                <i class="fa-solid fa-check"></i>
                            </div>
                            <span class="font-extrabold text-emerald-700">Chính xác! Thể Trí của bạn rất minh mẫn.</span>
                        </div>
                        <div class="flex flex-wrap justify-center gap-4 w-full mt-2">
                            <button onclick="speakText('${currentCard.exampleJP}')" class="flex-1 md:flex-none px-6 py-3 bg-white text-emerald-600 border border-emerald-200 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-50 shadow-sm font-bold transition">
                                <i class="fa-solid fa-headphones"></i> Nghe lại
                            </button>
                            <button onclick="nextCard()" class="flex-1 md:flex-none px-6 py-3 bg-emerald-600 text-white rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-700 shadow-md font-bold transition">
                                Câu tiếp theo <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>`;
                } else {
                    resultHTML = `
                    <div class="w-full p-6 rounded-3xl flex flex-col items-center gap-4 animate-fade-in bg-rose-50 border border-rose-200 shadow-inner">
                        <div class="flex items-center gap-3 text-lg">
                            <div class="bg-rose-500 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-md">
                                <i class="fa-solid fa-xmark"></i>
                            </div>
                            <span class="font-bold text-rose-700">Chưa chính xác. Hãy để tâm trí tĩnh lặng và thử lại.</span>
                        </div>
                        <button onclick="resetJlpt()" class="px-8 py-3 bg-white border border-slate-300 text-slate-700 rounded-xl hover:bg-slate-50 font-bold transition shadow-sm mt-2 flex items-center gap-2">
                            <i class="fa-solid fa-rotate-left"></i> Xóa đi ghép lại
                        </button>
                    </div>`;
                }
            }

            return `
            <div class="max-w-2xl mx-auto w-full animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="setView('category_menu')" class="text-slate-500 hover:text-slate-800 font-bold transition flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left"></i> Chuyên đề
                    </button>
                    <span class="bg-orange-100 text-orange-800 px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm border border-orange-200">
                        <i class="fa-solid fa-star text-xs"></i> Luyện Dấu Sao (N3)
                    </span>
                </div>

                <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6 border border-slate-100">
                    <div class="mb-8 text-center bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3"><i class="fa-solid fa-language mr-1"></i> Nghĩa tiếng Việt</p>
                        <p class="text-xl md:text-2xl text-slate-800 font-bold leading-relaxed">${currentCard.exampleVN}</p>
                    </div>

                    <div class="min-h-[90px] bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl mb-8 flex flex-wrap gap-2 items-center justify-center p-5 transition-colors ${state.selectedParts.length > 0 ? 'border-orange-300 bg-orange-50/30' : ''}">
                        ${selectedHTML}
                    </div>

                    <div class="flex flex-wrap gap-3 justify-center mb-8">
                        ${shuffledHTML}
                    </div>

                    <div class="flex flex-col items-center gap-4">
                        ${resultHTML}
                    </div>
                </div>
                
                <div class="flex justify-between items-center text-sm font-bold text-slate-400">
                    <button onclick="prevCard()" class="hover:text-slate-800 transition flex items-center gap-1"><i class="fa-solid fa-angle-left"></i> Câu trước</button>
                    <span class="bg-slate-100 px-4 py-1.5 rounded-full text-slate-600 border border-slate-200 shadow-inner">${state.currentIndex + 1} / ${state.filteredData.length}</span>
                    <button onclick="nextCard()" class="hover:text-slate-800 transition flex items-center gap-1">Bỏ qua <i class="fa-solid fa-angle-right"></i></button>
                </div>
            </div>`;
        }

        render();
    </script>
</body>
</html>
